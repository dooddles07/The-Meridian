<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Payment</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f4f1ea; color: #2c2620; padding: 24px;
    }
    @media (prefers-color-scheme: dark) { body { background: #1a1713; color: #ece6db; } .card { background: #241f19 !important; box-shadow: none !important; } }
    .card {
      background: #fff; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.12);
      max-width: 420px; width: 100%; padding: 32px; text-align: center;
    }
    .badge {
      display: inline-block; font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
      color: #856728; background: rgba(133,103,40,.12); padding: 5px 12px; border-radius: 999px; margin-bottom: 18px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 6px; }
    p { font-size: .9rem; line-height: 1.55; opacity: .85; margin: 8px 0; }
    .lock { font-size: 2rem; margin-bottom: 8px; }
    .amount { font-size: 2rem; font-weight: 700; color: #856728; margin: 14px 0 4px; }
    .hint { margin-top: 20px; font-size: .8rem; opacity: .7; }
    .fake-fields { text-align: left; margin: 22px 0 4px; }
    .fake-fields label { display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; opacity:.6; margin:12px 0 4px; }
    .fake-fields .box { border:1px solid rgba(133,103,40,.35); border-radius:9px; padding:10px 12px; font-size:.9rem; opacity:.75; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Demo Payment Gateway</div>
    <div class="lock">🔒</div>
    <h1>Secure Checkout</h1>
    <p>This is a <strong>simulated</strong> payment page for the portfolio demo. No card is charged and no request leaves your browser.</p>
    <div class="amount">SGD —</div>
    <div class="fake-fields">
      <label>Card number</label><div class="box">4242 4242 4242 4242</div>
      <label>Expiry / CVC</label><div class="box">12/28 &nbsp;·&nbsp; 123</div>
    </div>
    <p class="hint">When you're done, close this window and tap <strong>“I've Completed Payment”</strong> to confirm your booking.</p>
  </div>
</body>
</html>
