# Explicit Nixpacks build plan.
# Auto-detection wasn't provisioning the Node toolchain (npm: command not found),
# so we declare it here. App dependencies live in ./backend; the backend serves
# the static ./public frontend.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm install --omit=dev"]

[start]
cmd = "cd backend && node server.js"
